# ARMS Task Routing Rules
# Maps agent names to keyword patterns used for auto-routing plain-text task descriptions.
# Patterns are matched as whole words (case-insensitive) against the task text.
# First matching rule wins; agents listed earlier have higher priority.

routing:
  arms-main-agent:
    keywords:
      - session.md
      - task table
      - task ledger
      - agent routing
      - memory workflow
      - orchestration
      - orchestrator
      - protocol command
      - arms init
      - engine workflow

  arms-product-agent:
